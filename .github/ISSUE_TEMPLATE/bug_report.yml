name: Bug report
description: Report a failing example, broken install, or incorrect behavior.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a concrete problem. If an example fails, include
        the command you ran and the last few lines of output.
  - type: input
    id: command
    attributes:
      label: Command
      description: The exact command that failed.
      placeholder: python3 examples/manipulation/01_pick_and_retry.py
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and install command.
      placeholder: Ubuntu 24.04, Python 3.12, python3 -m pip install -e .
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Any extra context, traceback, or suspected cause.
